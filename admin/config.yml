backend:
  name: git-gateway
  branch: main

logo_url: /images/logofaceFINAL.png

media_folder: "images/blog"
public_folder: "/images/blog"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    sort: "date:desc"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Financial Planning"
          - "Retirement & Wealth"
          - "Estate Planning & Trusts"
          - "Insurance"
          - "Tax Strategy"
          - "Business & Legal"
          - "Company News"
      - { label: "Description", name: "description", widget: "text", hint: "Short excerpt shown on blog listing cards (1-2 sentences)" }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false, hint: "Optional hero/card image. Recommended 1200x630px." }
      - { label: "Body", name: "body", widget: "markdown" }
